# ============================================================
# docker-compose.yml — Fuzzy Analytics Pipeline
# Services: postgres, airflow-init, airflow-webserver,
#           airflow-scheduler, spark-master, spark-worker
# ============================================================

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME}
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__LOGGING__LOGGING_LEVEL=INFO
    - AIRFLOW__CORE__DEFAULT_TIMEZONE=${AIRFLOW__CORE__DEFAULT_TIMEZONE}
    # SQL Server
    - SQLSERVER_HOST=${SQLSERVER_HOST}
    - SQLSERVER_PORT=${SQLSERVER_PORT}
    - SQLSERVER_DB=${SQLSERVER_DB}
    - SQLSERVER_USER=${SQLSERVER_USER}
    - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
    # Google Cloud
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/gcp/gcp_key.json
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark:/opt/spark-project
    - ./dbt:/opt/dbt-project
    - ./keys:/opt/airflow/gcp
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - data_pipeline_net

services:

  # ── 1. Postgres: stores Airflow metadata ─────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_pipeline_net
    restart: unless-stopped

  # ── 2. Airflow init: runs once to set up DB and admin user
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "✅ Airflow init done"
    restart: on-failure

  # ── 3. Airflow webserver: UI at http://localhost:8080 ────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── 4. Airflow scheduler: triggers DAG runs ───────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped

  # ── 5. Spark Master: coordinates the Spark cluster ───────
  spark-master:
    image: apache/spark:3.4.1
    container_name: spark-master
    hostname: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8081
      - SPARK_DAEMON_MEMORY=${SPARK_MASTER_MEMORY:-2g}
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - ./spark:/opt/spark-project
    networks:
      - data_pipeline_net
    restart: unless-stopped

  # ── 6. Spark Worker: executes the actual computation ─────
  spark-worker:
    image: apache/spark:3.4.1
    container_name: spark-worker
    hostname: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2g}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
      - SPARK_WORKER_WEBUI_PORT=8082
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8082:8082"
    volumes:
      - ./spark:/opt/spark-project  
    depends_on:
      - spark-master
    networks:
      - data_pipeline_net
    restart: unless-stopped

networks:
  data_pipeline_net:
    name: ${COMPOSE_PROJECT_NAME}_net